name: Resource Request
description: Request or propose a resource for inclusion in neuromaps-prime.
title: 'Resource Request: '
labels: [resource]

body:
- type: textarea
  id: resource-description
  attributes:
    label: Resource Description
    description: Please provide a clear and concise description of the resource.
    placeholder: Describe the resource here.
  validations:
    required: true
- type: dropdown
  id: resource-type
  attributes:
    label: Resource Type
    description: Select the type of resource.
    options:
      - Annotation
      - Atlas
      - Transform
      - Other
  validations:
    required: true
- type: input
  id: resource-source
  attributes:
    label: Resource URI / Source
    description: Please provide a direct URI or source link if available.
    placeholder: https://...
  validations:
    required: false
- type: textarea
  id: references
  attributes:
    label: References
    description: Please provide any relevant references, publications, or DOIs.
    placeholder: Add references here.
  validations:
    required: false
- type: textarea
  id: access-details
  attributes:
    label: Access Details
    description: Please describe any access restrictions, DUA requirements, or upload coordination needs.
    placeholder: Describe access or sharing details here.
  validations:
    required: false
- type: textarea
  id: additional-notes
  attributes:
    label: Additional Notes
    description: Add any notes, caveats, version information, or other context here.
    placeholder: Add additional notes here.