name: Resource Contribution
description: Propose a new resource contribution to neuromaps-prime.
title: 'Resource: '
labels: [resource]

body:
- type: input
  id: resource-name
  attributes:
    label: Resource Name
    description: Name of the resource.
    placeholder: e.g. Human Connectome Project Atlas
  validations:
    required: true

- type: dropdown
  id: resource-type
  attributes:
    label: Resource Type
    description: Select the type of resource.
    options:
      - Annotation
      - Atlas
      - Transform
      - Other
  validations:
    required: true

- type: dropdown
  id: access-status
  attributes:
    label: Resource Availability
    description: How can this resource be accessed?
    options:
      - Publicly hosted
      - Requires upload coordination
      - Requires DUA or restricted access
  validations:
    required: true

- type: input
  id: uri
  attributes:
    label: Public URI / Source
    description: Provide a public URI or source link if available.
    placeholder: https://...
  validations:
    required: false

- type: textarea
  id: description
  attributes:
    label: Description
    description: Provide a clear description of the resource.
    placeholder: Describe the resource here.
  validations:
    required: true

- type: textarea
  id: references
  attributes:
    label: References
    description: Include DOIs, publications, or other references if available.
    placeholder: Add references here.
  validations:
    required: false

- type: textarea
  id: access-notes
  attributes:
    label: Access / Sharing Notes
    description: Include any relevant details about DUA requirements, restricted access, or upload coordination.
    placeholder: Add access or sharing notes here.
  validations:
    required: false

- type: textarea
  id: notes
  attributes:
    label: Additional Notes
    description: Add any caveats, version information, or other context.
    placeholder: Add additional notes here.
  validations:
    required: false