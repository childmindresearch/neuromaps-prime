name: Validate graph YAMLs
permissions:
  contents: read

on:
  push:
    branches:
    - main
    paths:
    - src/neuromaps_prime/resources/**/*.yaml
    - schemas/**/neuromaps_*.schema.json
    - .github/workflows/validate_graph.yaml
  pull_request:
    paths:
    - src/neuromaps_prime/resources/**/*.yaml
    - schemas/**/neuromaps_*.schema.json
    - .github/workflows/validate_graph.yaml

jobs:
  validate:
    name: Validate graph YAML
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v8.2.0

    - name: Validate nodes
      run: |
        find src/neuromaps_prime/resources/nodes -name "*.yaml" \
          -exec uv run --only-group validate check-jsonschema \
            --schemafile schemas/neuromaps_nodes.schema.json \
            --verbose {} +

    - name: Validate surface edges
      run: |
        find src/neuromaps_prime/resources/edges/surface -name "*.yaml" \
          -exec uv run --only-group validate check-jsonschema \
            --schemafile schemas/neuromaps_surface_edges.schema.json \
            --verbose {} +

    - name: Validate volume edges
      run: |
        find src/neuromaps_prime/resources/edges/volume -name "*.yaml" \
          -exec uv run --only-group validate check-jsonschema \
            --schemafile schemas/neuromaps_volume_edges.schema.json \
            --verbose {} +

    - name: Validate URLs
      run: |
        shopt -s globstar
        uv run --script scripts/validate_urls.py \
          src/neuromaps_prime/resources/**/*.yaml
