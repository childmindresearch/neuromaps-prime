name: Publish to PyPI

on:
  push:
    tags:
    - '*'

env:
  UV_FROZEN: true

jobs:
  pypi-release:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/neuromaps-prime
    permissions:
      id-token: write # Necessary for trusted publish on PyPI

    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v8.2.0
    - name: Build
      run: |
        uv sync --no-dev --no-install-project
        uv build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
