ce", "width": 2}, {"arrows": "to, from", "color": "#80B2D4", "from": "CIVETNMT", "label": "41k", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 0, "n_volume_transforms_res": 1, "n_xfms": 2, "res": ["41k"], "to": "NMT2Sym", "type": "surface_to_surface", "width": 2}, {"arrows": "to", "color": "#80B2D4", "from": "CIVETNMT", "label": "41k", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 0, "n_volume_transforms_res": 1, "n_xfms": 2, "res": ["41k"], "to": "Yerkes19", "type": "surface_to_surface", "width": 2}, {"arrows": "to", "color": "#A28DC7", "from": "D99", "label": "41k, 400um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["41k", "400um"], "to": "MEBRAINS", "type": "both", "width": 3}, {"arrows": "to, from", "color": "#A28DC7", "from": "D99", "label": "41k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["41k", "250um"], "to": "NMT2Sym", "type": "both", "width": 3}, {"arrows": "to, from", "color": "#A28DC7", "from": "D99", "label": "32k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["32k", "250um"], "to": "Yerkes19", "type": "both", "width": 3}, {"arrows": "to", "color": "#80B2D4", "from": "MEBRAINS", "label": "101k", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 0, "n_volume_transforms_res": 1, "n_xfms": 2, "res": ["101k"], "to": "CIVETNMT", "type": "surface_to_surface", "width": 2}, {"arrows": "to", "color": "#A28DC7", "from": "MEBRAINS", "label": "101k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["101k", "250um"], "to": "D99", "type": "both", "width": 3}, {"arrows": "to", "color": "#A28DC7", "from": "MEBRAINS", "label": "101k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["101k", "250um"], "to": "NMT2Sym", "type": "both", "width": 3}, {"arrows": "to", "color": "#A28DC7", "from": "MEBRAINS", "label": "101k, 500um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["101k", "500um"], "to": "Yerkes19", "type": "both", "width": 3}, {"arrows": "to", "color": "#A28DC7", "from": "NMT2Sym", "label": "41k, 400um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["41k", "400um"], "to": "MEBRAINS", "type": "both", "width": 3}, {"arrows": "to", "color": "#A28DC7", "from": "NMT2Sym", "label": "41k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["41k", "250um"], "to": "Yerkes19", "type": "both", "width": 3}, {"arrows": "to", "color": "#80B2D4", "from": "Yerkes19", "label": "32k", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 0, "n_volume_transforms_res": 1, "n_xfms": 2, "res": ["32k"], "to": "CIVETNMT", "type": "surface_to_surface", "width": 2}, {"arrows": "to", "color": "#A28DC7", "from": "Yerkes19", "label": "32k, 400um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["32k", "400um"], "to": "MEBRAINS", "type": "both", "width": 3}, {"arrows": "to", "color": "#A28DC7", "from": "Yerkes19", "label": "32k, 250um", "n_surface_transforms": 4, "n_surface_transforms_res": 1, "n_volume_transforms": 1, "n_volume_transforms_res": 2, "n_xfms": 3, "res": ["32k", "250um"], "to": "NMT2Sym", "type": "both", "width": 3}]);

              drawGraph();
              // ---------------------------------------------------------------
              // Export the rendered graph as a true vector SVG (for Inkscape).
              // vis-network draws to <canvas>, so we reconstruct equivalent SVG
              // from the settled layout: node positions/sizes + edge geometry.
              // ---------------------------------------------------------------
              function _esc(s) {
                return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
                                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
              }
              function _darken(hex, f) {
                var c = (hex || "#888888").replace("#", "");
                if (c.length === 3) c = c.split("").map(function (x) { return x + x; }).join("");
                function h(x) { return ("0" + Math.max(0, Math.min(255, x)).toString(16)).slice(-2); }
                return "#" + h(Math.round(parseInt(c.slice(0, 2), 16) * f))
                           + h(Math.round(parseInt(c.slice(2, 4), 16) * f))
                           + h(Math.round(parseInt(c.slice(4, 6), 16) * f));
              }
              function exportSVG() {
                var ids = nodes.getIds();
                var nodeObjs = nodes.get({ returnType: "Object" });
                var edgeArr = edges.get();
                var pos = network.getPositions(ids);

                // node centers (R) + radii from the actual rendered bounding boxes
                var R = {}, C = {};
                var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                ids.forEach(function (id) {
                  var bb = network.getBoundingBox(id);
                  R[id] = Math.max((bb.right - bb.left) / 2, (bb.bottom - bb.top) / 2);
                  C[id] = { x: pos[id].x, y: pos[id].y };
                  minX = Math.min(minX, bb.left);  maxX = Math.max(maxX, bb.right);
                  minY = Math.min(minY, bb.top);   maxY = Math.max(maxY, bb.bottom);
                });
                var pad = 100;
                var vbX = minX - pad, vbY = minY - pad;
                var vbW = (maxX - minX) + 2 * pad, vbH = (maxY - minY) + 2 * pad;

                var edgeSvg = [], arrowSvg = [], labelSvg = [];
                edgeArr.forEach(function (e) {
                  var a = C[e.from], b = C[e.to];
                  if (!a || !b) return;
                  var cx, cy, via = null, body = network.body && network.body.edges[e.id];
                  if (body && body.edgeType && typeof body.edgeType.getViaNode === "function") {
                    try { via = body.edgeType.getViaNode(); } catch (_) { via = null; }
                  }
                  if (via && isFinite(via.x) && isFinite(via.y)) {
                    cx = via.x; cy = via.y;
                  } else {
                    var dx = b.x - a.x, dy = b.y - a.y, len = Math.sqrt(dx * dx + dy * dy) || 1;
                    cx = (a.x + b.x) / 2 + (-dy / len) * 0.2 * len;
                    cy = (a.y + b.y) / 2 + (dx / len) * 0.2 * len;
                  }
                  function trim(ctr, rad) {
                    var vx = cx - ctr.x, vy = cy - ctr.y, vl = Math.sqrt(vx * vx + vy * vy) || 1;
                    return { x: ctr.x + vx / vl * rad, y: ctr.y + vy / vl * rad };
                  }
                  var s = trim(a, R[e.from]), t = trim(b, R[e.to]);
                  var col = e.color || "#999999", w = e.width || 1;
                  edgeSvg.push('<path d="M ' + s.x + ' ' + s.y + ' Q ' + cx + ' ' + cy + ' ' + t.x + ' ' + t.y +
                               '" fill="none" stroke="' + _esc(col) + '" stroke-width="' + w + '"/>');

                  var arr = (e.arrows || "").toString(), asz = 8 + w * 2;
                  function tri(tip, dirx, diry) {
                    var nx = -diry, ny = dirx, hw = asz * 0.45;
                    var bx = tip.x - dirx * asz, by = tip.y - diry * asz;
                    return '<polygon points="' + tip.x + ',' + tip.y + ' ' +
                           (bx + nx * hw) + ',' + (by + ny * hw) + ' ' +
                           (bx - nx * hw) + ',' + (by - ny * hw) + '" fill="' + _esc(col) + '"/>';
                  }
                  if (arr.indexOf("to") !== -1) {
                    var d1x = t.x - cx, d1y = t.y - cy, d1l = Math.sqrt(d1x * d1x + d1y * d1y) || 1;
                    arrowSvg.push(tri(t, d1x / d1l, d1y / d1l));
                  }
                  if (arr.indexOf("from") !== -1) {
                    var d2x = s.x - cx, d2y = s.y - cy, d2l = Math.sqrt(d2x * d2x + d2y * d2y) || 1;
                    arrowSvg.push(tri(s, d2x / d2l, d2y / d2l));
                  }
                  if (e.label) {
                    var lp = (body && body.edgeType && typeof body.edgeType.getPoint === "function")
                             ? (function () { try { return body.edgeType.getPoint(0.5); } catch (_) { return null; } })()
                             : null;
                    var lx = lp ? lp.x : (0.25 * a.x + 0.5 * cx + 0.25 * b.x);
                    var ly = lp ? lp.y : (0.25 * a.y + 0.5 * cy + 0.25 * b.y);
                    var ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
                    if (ang > 90) ang -= 180; else if (ang < -90) ang += 180;
                    var fs = 14, tw = ("" + e.label).length * fs * 0.55, th = fs * 1.3;
                    labelSvg.push('<g transform="rotate(' + ang.toFixed(3) + ' ' + lx + ' ' + ly + ')">' +
                                  '<rect x="' + (lx - tw / 2) + '" y="' + (ly - th / 2) + '" width="' + tw +
                                  '" height="' + th + '" fill="#ffffff"/><text x="' + lx + '" y="' + (ly + fs * 0.35) +
                                  '" font-family="Nunito,sans-serif" font-size="' + fs +
                                  '" text-anchor="middle" fill="#343434">' + _esc(e.label) + '</text></g>');
                  }
                });

                var nodeSvg = [];
                ids.forEach(function (id) {
                  var n = nodeObjs[id], c = C[id], r = R[id], fill = n.color || "#cccccc";
                  var lbl = ((n.label != null ? n.label : n.name) || id).toString().trim();
                  nodeSvg.push('<circle cx="' + c.x + '" cy="' + c.y + '" r="' + r + '" fill="' + _esc(fill) +
                               '" stroke="' + _esc(_darken(fill, 0.7)) + '" stroke-width="2"/>');
                  nodeSvg.push('<text x="' + c.x + '" y="' + (c.y + 7) + '" font-family="Nunito,sans-serif" font-size="20" ' +
                               'text-anchor="middle" fill="#343434">' + _esc(lbl) + '</text>');
                });

                var svg = '<?xml version="1.0" encoding="UTF-8"?>\n' +
                  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH +
                  '" width="' + vbW + '" height="' + vbH + '">\n' +
                  '<rect x="' + vbX + '" y="' + vbY + '" width="' + vbW + '" height="' + vbH + '" fill="#ffffff"/>\n' +
                  '<g id="edges">\n' + edgeSvg.join("\n") + '\n</g>\n' +
                  '<g id="arrowheads">\n' + arrowSvg.join("\n") + '\n</g>\n' +
                  '<g id="edge-labels">\n' + labelSvg.join("\n") + '\n</g>\n' +
                  '<g id="nodes">\n' + nodeSvg.join("\n") + '\n</g>\n' +
                  '</svg>\n';

                var blob = new Blob([svg], { type: "image/svg+xml" });
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a");
                a.href = url; a.download = "neuromaps_interactive_graph.svg";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);

              }
